# Exported from Render on 2026-06-21T14:41:44Z
version: "1"
projects:
  - name: Market Miam
    environments:
      - name: Production
        services:
          - type: web
            name: api
            runtime: node
            repo: https://github.com/willehpeh/market-monster
            plan: starter
            envVars:
              - key: AUTH0_ISSUER
                sync: false
              - key: AUTH0_AUDIENCE
                sync: false
              # Cloudinary signed uploads (vendor photo uploads); set all three in the dashboard
              - key: CLOUDINARY_CLOUD_NAME
                sync: false
              - key: CLOUDINARY_API_KEY
                sync: false
              - key: CLOUDINARY_API_SECRET
                sync: false
              - key: DATABASE_CONNECTION_STRING
                fromDatabase:
                  name: event-store
                  property: connectionString
              # OpenTelemetry -> Honeycomb (ADR 0026)
              - key: OTEL_SERVICE_NAME
                value: api
              - key: OTEL_EXPORTER_OTLP_ENDPOINT
                value: https://api.honeycomb.io
              - key: OTEL_EXPORTER_OTLP_PROTOCOL
                value: http/protobuf
              # Secret: set in dashboard as `x-honeycomb-team=<ingest-key>`
              - key: OTEL_EXPORTER_OTLP_HEADERS
                sync: false
            region: frankfurt
            buildCommand: npm ci && npx nx run api:build
            startCommand: node dist/apps/api/main.js
            domains:
              - api.marketmiam.fr
            autoDeployTrigger: checksPass
            buildFilter:
              paths:
                - apps/api/**
                - packages/**
                - package.json
                - package-lock.json
                - nx.json
                - tsconfig.base.json
          - type: web
            name: vendor-frontend
            runtime: static
            repo: https://github.com/willehpeh/market-monster
            buildCommand: npm ci && npx nx run vendor-frontend:build
            staticPublishPath: ./dist/apps/vendor-frontend/browser
            routes:
              - type: rewrite
                source: /*
                destination: /index.html
            domains:
              - app.marketmiam.fr
            autoDeployTrigger: checksPass
            renderSubdomainPolicy: disabled
            buildFilter:
              paths:
                - apps/vendor-frontend/**
                - packages/**
                - package.json
                - package-lock.json
                - nx.json
                - tsconfig.base.json
          - type: web
            name: customer-frontend
            runtime: node
            repo: https://github.com/willehpeh/market-monster
            plan: free
            region: frankfurt
            buildCommand: npm ci && npx nx run customer-frontend:build
            startCommand: node dist/apps/customer-frontend/server/server.mjs
            domains:
              - '*.marketmiam.fr'
            autoDeployTrigger: checksPass
            buildFilter:
              paths:
                - apps/customer-frontend/**
                - packages/**
                - package.json
                - package-lock.json
                - nx.json
                - tsconfig.base.json
          - type: web
            name: website
            runtime: static
            repo: https://github.com/willehpeh/market-monster
            buildCommand: npm ci && npx nx build website
            staticPublishPath: ./dist/apps/website
            domains:
              - www.marketmiam.fr
              - marketmiam.fr
            autoDeployTrigger: checksPass
            renderSubdomainPolicy: disabled
            buildFilter:
              paths:
                - apps/website/**
                - packages/**
                - package.json
                - package-lock.json
                - nx.json
                - tsconfig.base.json
        databases:
          - name: event-store
            databaseName: marketmiam
            user: marketmiam
            plan: basic-256mb
            region: frankfurt
            postgresMajorVersion: "18"
